---
# 网站基础设置
title: "test"
subtitle: "My Personal Dashboard"
logo: "assets/tools/homer.png"
header: true
footer: '<p>Created with <span class="has-text-danger">❤️</span> using Homer</p>'

# 启用多引擎聚合搜索 (回车直接跳转)
connectivityCheck: true
search:
  SearchProviders:
    - name: "Google"
      url: "https://www.google.com/search?q="
    - name: "Bilibili"
      url: "https://search.bilibili.com/all?keyword="
    - name: "GitHub"
      url: "https://github.com/search?q="
  target: "_blank"

# 欢迎提示语卡片
message:
  style: "is-dark"
  title: "👋 欢迎来到你的专属领地！"
  icon: "fa-solid fa-rocket"
  content: "这里是你的全网导航控制中心。所有的分类、颜色、图标都可以通过修改 <code>config.yml</code> 轻松定制。"

# 深度定制的护眼主题颜色 (支持明暗自动切换)
colors:
  light:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#f5f5f5"
    card-background: "#ffffff"
    text: "#363636"
    text-header: "#4a4a4a"
    text-title: "#303030"
    text-subtitle: "#4a4a4a"
    card-shadow: rgba(0, 0, 0, 0.1)
    link: "#3273dc"
    link-hover: "#363636"
  dark:
    highlight-primary: "#3273dc"
    highlight-secondary: "#209cee"
    highlight-hover: "#3298dc"
    background: "#131313"
    card-background: "#2b2b2b"
    text: "#eaeaea"
    text-header: "#ffffff"
    text-title: "#fafafa"
    text-subtitle: "#f5f5f5"
    card-shadow: rgba(0, 0, 0, 0.4)
    link: "#3273dc"
    link-hover: "#ffffff"

# ========================================
# 网站分类与卡片内容区域
# ========================================
services:
  - name: "🚀 效率工具"
    icon: "fa-solid fa-toolbox"
    items:
      - name: "ChatGPT"
        # 直接使用网络图片链接作为 Logo
        logo: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg"
        subtitle: "AI 生产力助手"
        tag: "AI"
        tagstyle: "is-info"
        url: "https://chatgpt.com"
        target: "_blank"
      - name: "GitHub"
        # 使用内置的 FontAwesome 矢量图标
        icon: "fa-brands fa-github"
        subtitle: "全球最大的代码托管平台"
        tag: "Dev"
        tagstyle: "is-dark"
        url: "https://github.com"
        target: "_blank"
      - name: "Notion"
        icon: "fa-solid fa-book"
        subtitle: "All-in-one 笔记与知识库"
        tag: "效率"
        tagstyle: "is-primary"
        url: "https://notion.so"
        target: "_blank"

  - name: "🍿 影音娱乐"
    icon: "fa-solid fa-film"
    items:
      - name: "Bilibili"
        icon: "fa-brands fa-bilibili"
        subtitle: "哔哩哔哩 (゜-゜)つロ 干杯~"
        tag: "视频"
        tagstyle: "is-danger"
        url: "https://www.bilibili.com"
        target: "_blank"
      - name: "YouTube"
        icon: "fa-brands fa-youtube"
        subtitle: "全球最大视频平台"
        tag: "视频"
        tagstyle: "is-danger"
        url: "https://www.youtube.com"
        target: "_blank"
      - name: "Netflix"
        icon: "fa-solid fa-tv"
        subtitle: "流媒体影视追剧"
        tag: "观影"
        tagstyle: "is-warning"
        url: "https://www.netflix.com"
        target: "_blank"

  - name: "☁️ 我的专属网络"
    icon: "fa-solid fa-server"
    items:
      - name: "家庭软路由"
        icon: "fa-solid fa-network-wired"
        subtitle: "路由器后台管理面板"
        tag: "内网"
        tagstyle: "is-success"
        # 这里可以放你内网的本地 IP，即使断网也能通过导航页点进去
        url: "http://192.168.1.1"
        target: "_blank"
      - name: "NAS 存储中心"
        icon: "fa-solid fa-hard-drive"
        subtitle: "我的私有云盘"
        tag: "数据"
        tagstyle: "is-success"
        url: "https://你的域名.com"
        target: "_blank"
